<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
        input[type="text"]{
            background-color: coral;
            color: beige;
        }
        input[type="email"]{
            background-color: mistyrose;
            color: darkolivegreen;
        }
    </style>
</head>
<body>
    <label for="name">Enter you name</label>
    <input type="text">
    <input type="email">
</body>
</html>
