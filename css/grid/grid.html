<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        #parent{
            display: grid;
            width: 100%;
            height: 500px;
            background-color: lightgray;
            /* grid-template-rows: 2fr 1fr 2fr; */
            grid-template-rows: repeat(3, 2fr);
            /* grid-template-columns: 2fr 1fr 2fr; */
            /* grid-template-columns: repeat(2, 2fr); */
            gap:30px;
            grid-template-areas: "a b b" "c c d" "e e e";
        }
        .child{
            width: auto;
            height: auto;
            background-color: darkslategray;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div class="child" style="grid-area: a;"></div>
        <div class="child" style="grid-area: b;"></div>
        <div class="child" style="grid-area: c;"></div>
        <div class="child" style="grid-area: d;"></div>
        <div class="child" style="grid-area: e;"></div>
        <div class="child" style="grid-area: f;"></div>
        
    </div>

</body>
</html>
