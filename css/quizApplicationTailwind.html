<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApplication-Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="m-0 flex flex-col font-mono">
    <header class="h-[100px] flex justify-center items-center font-bold bg-yellow-100" >Quiz Application</header>
    <main>
        <section>
            <h4>1. why do come late to class?</h4>
            <div>
                <input type="radio" name="one" id="op1">
                <label for="op1">A. traffic</label>
            </div>
            <div>
                <input type="radio" name="one" id="w1" >
                <label for="w1">B. breakfast</label>
            </div>
            <div>
                <input type="radio" name="one" id="w11">
                <label for="w11">C.Sleep</label>
            </div>
            <div>
                <input type="radio" name="one", id="w111">
                <label for="w111">D.others</label>
            </div>

            <p id="op1an">correct</p>
            <p id="w1an">incorrect</p>

            <h4>2. why do you ask so many questions?</h4>
            <div>
                <input type="radio" name="two" id="op2">
                <label for="op2">A. improve your performance</label>
            </div>
            <div>
                <input type="radio" name="two" id="w2" >
                <label for="w2">B. make you bored</label>
            </div>
            <div>
                <input type="radio" name="two" id="w22">
                <label for="w22">C. disturb</label>
            </div>
            <div>
                <input type="radio" name="two", id="w222">
                <label for="w222">D. eliminate</label>
            </div>

            <p id="op2an">correct</p>
            <p id="w2an">incorrect</p>

            <h4>3. who is prime minister of india?</h4>
            <div>
                <input type="radio" name="three" id="op3">
                <label for="op3">A. narendra modi</label>
            </div>
            <div>
                <input type="radio" name="three" id="w3" >
                <label for="w3">B. ashok mittal</label>
            </div>
            <div>
                <input type="radio" name="three" id="w33">
                <label for="w33">C. arvind kejriwal</label>
            </div>
            <div>
                <input type="radio" name="three", id="w333">
                <label for="w333">D. me</label>
            </div>

            <p id="op3an">correct</p>
            <p id="w3an">incorrect</p>
        </section>
    </main>

    <footer class="h-[100px] flex justify-center items-center font-bold bg-indigo-950 text-fuchsia-50">
        this is footer part
    </footer>
</body>
</html>
