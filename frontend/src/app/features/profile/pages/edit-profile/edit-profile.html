<div class="container">
  <div class="page-header">
    <div>
      <h2>Edit Profile</h2>
      <p>Keep your information up to date</p>
    </div>
    <a routerLink="/profile" class="btn-secondary">← Back</a>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Bio -->
      <div class="form-group">
        <label>Bio</label>
        <textarea formControlName="bio" rows="3"></textarea>
      </div>

      <!-- Grid -->
      <div class="grid">
        <div class="form-group">
          <label>Location</label>
          <input type="text" formControlName="location" />
        </div>

        <div class="form-group">
          <label>Experience</label>
          <input type="text" formControlName="experience" />
        </div>
      </div>

      <!-- Skills -->
      <div class="form-group">
        <label>Skills</label>
        <input type="text" formControlName="skills" placeholder="React, Java, AI..." />
      </div>

      <!-- Company -->
      <div class="form-group">
        <label>Company Name</label>
        <input type="text" formControlName="companyName" />
      </div>

      <!-- Portfolio -->
      <div class="form-group">
        <label>Portfolio Links</label>
        <input type="text" formControlName="portfolioLinks" />
      </div>

      <!-- Buttons -->
      <div class="actions">
        <a routerLink="/profile" class="btn-secondary">Cancel</a>

        <button type="submit" class="btn-primary" [disabled]="loading()">
          {{ loading() ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>

    </form>
  </div>
</div>
