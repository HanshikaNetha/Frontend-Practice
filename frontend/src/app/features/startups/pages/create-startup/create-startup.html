<div class="container">

  <div class="header">
    <div>
      <h2>Create Startup</h2>
      <p>Launch your startup on FounderLink</p>
    </div>
    <button class="btn-secondary" (click)="router.navigate(['/dashboard'])">
      ← Cancel
    </button>
  </div>

  <div class="card">

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Startup Name *</label>
        <input type="text" [(ngModel)]="startup.startupName" name="startupName" required />
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea [(ngModel)]="startup.description" name="description" required></textarea>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>Stage *</label>
          <select [(ngModel)]="startup.stage" name="stage" required>
            <option value="">Select stage</option>
            <option value="IDEA">Idea</option>
            <option value="MVP">MVP</option>
            <option value="EARLY_TRACTION">Early Traction</option>
            <option value="SCALING">Scaling</option>
          </select>
        </div>

        <div class="form-group">
          <label>Industry</label>
          <input type="text" [(ngModel)]="startup.industry" name="industry" />
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>Funding Goal</label>
          <input type="number" [(ngModel)]="startup.fundingGoal" name="fundingGoal" />
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" [(ngModel)]="startup.location" name="location" />
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn-secondary" (click)="router.navigate(['/dashboard'])">
          Cancel
        </button>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Startup' }}
        </button>
      </div>

    </form>

  </div>

</div>
