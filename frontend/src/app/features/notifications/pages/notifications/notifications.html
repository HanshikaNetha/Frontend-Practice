<div id="notifications">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h2 class="page-title">Notifications 🔔</h2>
      <p class="page-subtitle">Stay updated on all activity</p>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="notifications.length === 0" class="empty-state">
    <div class="empty-icon">🔔</div>
    <h3>No notifications</h3>
    <p>You're all caught up!</p>
  </div>

  <!-- Notification List -->
  <div class="notif-list" *ngIf="notifications.length > 0">

    <div class="notif-row"
         *ngFor="let n of notifications"
         [class.unread]="!n.read">

      <div class="notif-icon-wrap">
        <span class="notif-icon">🔔</span>
      </div>

      <div class="notif-content">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-message">{{ n.message }}</div>
        <div class="notif-time">
          {{ n.createdAt | date:'medium' }}
        </div>

        <!-- Invitation ID -->
        <div *ngIf="n.message.includes('Invitation ID')" class="invite-id">
          Invitation ID: {{ extractInvitationId(n.message) }}
        </div>
      </div>

      <div class="notif-actions">
        <button *ngIf="!n.read" (click)="markAsRead(n.notificationId)">
          Mark as Read
        </button>
      </div>

    </div>

  </div>

</div>
