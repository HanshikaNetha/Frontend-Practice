<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <label for="name">Name</label>
        <input type="text" id="name">
        <br>
        <label for="age">Age</label>
        <input type="number" id="age">
        <br>
        <label for="gender">Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Others
        <br>
        <label for="subject">Subject</label>
        <input type="checkbox" name="subject">C
        <input type="checkbox" name="subject">C=++
        <input type="checkbox" name="subject">Java
        <input type="checkbox" name="subject">Python
        <br>
        <label for="password" value="">Password</label>
        <input type="password" name="pass" value="">
        <br>
        <label for="fileinput">Upload File</label>
        <input type="file" id="fileinput">
        <br>
        <label for="DateS">SelectDate</label>
        <input type="date" id="DateS">
        <br>
        <label for ="time">SelectTime</label>
        <input type="time" id="time">
        <br>
        <label for="DataTime">SelectDateTime</label>
        <input type="datetime-local" id="DataTime">
        <br>
        <label for="emaili" value="">Email</label>
        <input type="email" id="emaili">
        <br>
        <label for="colorS">select Color</label>
        <input type="color" id="colorS">
        <br>
        <label for="SelectRange">SelectRange</label>
        <input type="range" id="SelectRange" min="0" max="100">
        <br>
        <button type="submit">Submit</button>
        
    </form>
</body>
</html>
