
<div class="eachCust">
    <table>
        <tr>
            <td id="id">{{customers.id}}</td>
            <td id="name">{{customers.name}}</td>
            <td id="address">{{customers.address}}</td>
            <td id="email">{{customers.email}}</td>
            <td id="phone">{{customers.phone}}</td>
            <td id="dob">{{customers.dob | date:'mediumDate'}}</td>
            <td id="gender">{{customers.gender}}</td>
        </tr>
    </table>
</div>
