<button (click)="need='cardView'">SElect card view</button>
<button (click)="need='listView'">SElect list view</button>

@if(need==='cardView'){
  <div>card view is selected</div>
  <div class="cont">
    @for(i of users; track i.name){
      <app-user-details (onUpdate)="parentAction($event)" name={{i.name}} [age]="i.age" address={{i.address}} gender={{i.gender}} />
    }
  </div>
}
@else if(need==='listView'){
  <div>list view is selected</div>
  <table id="tab">
    @for(i of users; track i.name){
      <tr>
        <app-userdetails-list-view (sendToParent)="updateUser($event)" name={{i.name}} [age]="i.age" address={{i.address}} gender={{i.gender}} />
      </tr>
    }
  </table>
  
}

<p>Description: {{Description | truncate:5}}</p>
